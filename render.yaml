services:
  # Frontend - Static Site
  - type: web
    name: medai-frontend
    runtime: static
    buildCommand: cd client && npm install && npm run build
    staticPublishPath: client/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN

  # Backend - Node.js API
  - type: web
    name: medai-server
    runtime: node
    buildCommand: cd server && npm install
    startCommand: cd server && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false
      - key: ML_SERVICE_URL
        fromService:
          type: web
          name: medai-ml
          property: hostport
    plan: free

  # ML Service - Python
  - type: web
    name: medai-ml
    runtime: docker
    dockerfilePath: ml-service/Dockerfile
    dockerContext: ml-service
    plan: free
    envVars:
      - key: PORT
        value: 5000
